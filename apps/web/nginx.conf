server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API + auth calls to the api service on the compose network.
    # Must come before the SPA fallback or POSTs would 405 on try_files.
    location /api/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # PWA: serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Cache static assets aggressively
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
