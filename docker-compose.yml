name: tp-manager

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tp
      POSTGRES_PASSWORD: tp_local_dev
      POSTGRES_DB: tp_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tp -d tp_manager"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tp_minio_admin
      MINIO_ROOT_PASSWORD: tp_minio_local_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://tp:tp_local_dev@postgres:5432/tp_manager
      BLOB_ENDPOINT: http://minio:9000
      BLOB_ACCESS_KEY: tp_minio_admin
      BLOB_SECRET_KEY: tp_minio_local_dev
      ML_BASE_URL: http://ml:8000
      LOG_LEVEL: info
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
    labels:
      # §6.12b — nightly ML retrain at 02:00 local. Invoked by the `scheduler`
      # service via ofelia. Logs go to the api container's stdout.
      ofelia.enabled: "true"
      ofelia.job-exec.nightly-train.schedule: "0 0 2 * * *"
      ofelia.job-exec.nightly-train.command: "pnpm --filter @tp/api exec tsx scripts/nightly-train.ts"

  ml:
    build:
      context: .
      dockerfile: services/ml/Dockerfile
    environment:
      PORT: 8000
      DATABASE_URL: postgres://tp:tp_local_dev@postgres:5432/tp_manager
      BLOB_ENDPOINT: http://minio:9000
      APP_VERSION: 0.1.0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  aloha-worker:
    build:
      context: .
      dockerfile: apps/aloha-worker/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgres://tp:tp_local_dev@postgres:5432/tp_manager
      BLOB_ENDPOINT: http://minio:9000
      LOG_LEVEL: info
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/healthz"]
      interval: 15s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  # §6.12b — cron sidecar. Reads ofelia labels off sibling containers and
  # `docker exec`s scheduled commands. The only job today is the nightly ML
  # retrain on the api container; add more by labelling the target container.
  scheduler:
    image: mcuadros/ofelia:0.3.12
    restart: unless-stopped
    command: daemon --docker
    depends_on:
      api:
        condition: service_healthy
      ml:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  postgres_data:
  minio_data:
